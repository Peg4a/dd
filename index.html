<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Diya's Translator</title>
    <meta
      name="description"
      content="Translate English text to Central Kurdish (Sorani) with a clean, fast web interface."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <main class="app">
      <header class="hero">
        <p class="eyebrow">Language Tool</p>
        <h1>Diya's Translator</h1>
        <p class="subtitle">
          Type in English, click translate, and get Central Kurdish (Sorani) text instantly.
        </p>
      </header>

      <section class="translator-card" aria-label="Translator form">
        <div class="mode-row">
          <span id="modeLabel">Direction: English to Central Kurdish</span>
          <button id="swapBtn" type="button" class="btn btn-ghost">Swap Languages</button>
        </div>

        <div class="panes">
          <div class="pane">
            <div class="pane-head">
              <span id="sourceLabel">English</span>
              <span id="charCount">0 chars</span>
            </div>
            <textarea
              id="sourceText"
              placeholder="Write English text here..."
              dir="ltr"
              lang="en"
              spellcheck="true"
            ></textarea>
          </div>

          <div class="pane">
            <div class="pane-head">
              <span id="targetLabel">Central Kurdish (Sorani)</span>
              <button id="copyBtn" type="button" class="link-btn">Copy</button>
            </div>
            <textarea
              id="targetText"
              placeholder="وەرگێڕانی کوردی ناوەندی لێرە دەردەکەوێت..."
              dir="rtl"
              lang="ckb"
              readonly
            ></textarea>
          </div>
        </div>

        <div class="actions">
          <button id="translateBtn" type="button" class="btn btn-primary">
            Translate
          </button>
          <button id="clearBtn" type="button" class="btn btn-secondary">Clear</button>
          <button id="useOutputBtn" type="button" class="btn btn-ghost">
            Use Output As Input
          </button>
        </div>

        <p id="status" class="status" aria-live="polite"></p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
